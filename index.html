<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLOBO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="plugin-window" id="plugin-window">

    <!-- ═══════════════════════════════════════════════════════════
         MAIN PANEL
    ════════════════════════════════════════════════════════════════ -->
    <div class="panel" id="main-panel">

      <header class="panel-header">
        <!-- Brand logo: click to show credits -->
        <div class="brand-select" id="brand-select">
          <button class="brand-btn" id="brand-btn" title="Crediti">
            <img class="brand-logo" src="media/Logo_TempoReale_white.webp" alt="Tempo Reale">
          </button>
        </div>
        <!-- Pattern presets: 16-slot memory, buttons mode / slider mode -->
        <div class="pattern-bar-wrap">
          <div class="pattern-bar" id="pattern-bar" data-mode="buttons"></div>
        </div>
        <button class="mode-toggle pattern-mode-toggle" id="pattern-mode-toggle" data-mode="buttons" title="Modalità a bottoni (clic: passa a slider)">
          <svg class="ico ico-buttons" viewBox="0 0 18 18" aria-hidden="true">
            <rect x="2.5" y="7" width="3.4" height="4" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <rect x="7.3" y="7" width="3.4" height="4" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <rect x="12.1" y="7" width="3.4" height="4" fill="none" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <svg class="ico ico-slider" viewBox="0 0 18 18" aria-hidden="true">
            <line x1="2.5" y1="9" x2="15.5" y2="9" stroke="currentColor" stroke-width="1.3"/>
            <rect x="7.3" y="6.3" width="3.4" height="5.4" fill="currentColor"/>
          </svg>
        </button>
        <!-- Right side: spat selector + ψ settings trigger + instance badge -->
        <div class="header-right">
          <div class="spat-select" id="spat-select">
            <button class="spat-btn mono" id="spat-btn">VBAP</button>
            <div class="spat-menu" id="spat-menu" hidden>
              <button class="spat-choice active"        data-spat="vbap">VBAP</button>
              <button class="spat-choice" data-spat="dbap">DBAP</button>
              <button class="spat-choice"        data-spat="ambisonics">Ambi3rd</button>
              <button class="spat-choice"        data-spat="ambisonics">Ambi7th</button>
              <button class="spat-choice"        data-spat="soundscape">Direct</button>
            </div>
          </div>
          <button class="logo-btn" id="logo-btn" title="Impostazioni"><svg class="logo-ico" viewBox="0 0 18 18" aria-hidden="true" style="fill: #505050"><line x1="2.5" y1="5" x2="15.5" y2="5" stroke="currentColor" stroke-width="1.4"/><line x1="2.5" y1="9" x2="15.5" y2="9" stroke="currentColor" stroke-width="1.4"/><line x1="2.5" y1="13" x2="15.5" y2="13" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="5" r="2" fill="var(--surface)" stroke="currentColor" stroke-width="1.4"/><circle cx="6" cy="9" r="2" fill="var(--surface)" stroke="currentColor" stroke-width="1.4"/><circle cx="12" cy="13" r="2" fill="var(--surface)" stroke="currentColor" stroke-width="1.4"/></svg></button>
          <span class="instance-badge mono" id="instance-badge">#1</span>
        </div>
      </header>

      <div class="panel-body">

        <!-- ─── LEFT: Circle navigation ─── -->
        <section class="circle-section">

          <!-- Subgroup selector: which speaker subgroup(s) this spatialization drives (mockup) -->
          <div class="subgroup-select" id="subgroup-select">
            <span class="subgroup-letters mono" id="subgroup-letters"></span>
            <button class="subgroup-btn" id="subgroup-btn" title="Subgroup altoparlanti">
              <svg class="ico" viewBox="0 0 18 18" aria-hidden="true">
                <circle cx="5" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="13" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="9" cy="5" r="2" fill="none" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </button>
            <div class="subgroup-menu" id="subgroup-menu" hidden>
              <button class="subgroup-item active" data-subgroup="a"><span class="subgroup-check"></span>Subset A</button>
              <button class="subgroup-item"        data-subgroup="b"><span class="subgroup-check"></span>Subset B</button>
              <button class="subgroup-item"        data-subgroup="c"><span class="subgroup-check"></span>Subset C</button>
            </div>
          </div>

          <div class="circle-area">
            <svg id="nav-circle" viewBox="0 0 200 200"
                 xmlns="http://www.w3.org/2000/svg"
                 aria-label="Navigazione azimutale"></svg>

            <div class="height-control">
              <button class="mode-toggle" id="height-mode-toggle" data-mode="hemisphere" title="Semisfera (clic: sfera)" aria-label="Modalità altezza">
                <svg class="ico ico-hemi" viewBox="0 0 18 18" aria-hidden="true">
                  <path d="M2 13 A7 7 0 0 1 16 13" fill="none" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="1" y1="13" x2="17" y2="13" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <svg class="ico ico-sphere" viewBox="0 0 18 18" aria-hidden="true">
                  <circle cx="9" cy="9" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
                  <ellipse cx="9" cy="9" rx="7" ry="2.6" fill="none" stroke="currentColor" stroke-width="1.2"/>
                </svg>
              </button>
              <div class="height-track">
                <span class="height-lbl top mono">90°</span>
                <input type="range" id="height-slider"
                       class="vertical-slider"
                       min="0" max="90" value="0" step="1">
                <span class="height-lbl bot mono">0°</span>
              </div>
              <span class="height-val mono" id="height-val">0°</span>
            </div>
          </div>

          <!-- Arc colour buttons — populated by arcs.js -->
          <div class="arc-btn-bar-wrap">
            <div class="arc-btn-bar" id="arc-btn-bar"></div>
            <!-- Mirrors .height-control's footprint so the patches center on the circle, not on the whole row -->
            <div class="height-control-ghost" aria-hidden="true"></div>
          </div>

          <!-- Readhead: always visible, below the circle -->
          <div class="readhead-bar" id="readhead-bar">
            <span class="rh-angle mono" id="rh-start">0.</span>

            <div class="rh-track-wrap">
              <div class="rh-track" id="rh-track">
                <div class="rh-dots" id="rh-dots"></div>
                <div class="rh-marker" id="rh-marker" title="Testina di lettura"></div>
              </div>
            </div>

            <span class="rh-angle mono" id="rh-end">1.</span>

            <div class="rh-controls">
              <div class="rh-ease-select" id="rh-ease-select">
                <button class="rh-ease-btn mono" id="rh-ease-btn">ease in</button>
                <div class="rh-ease-menu" id="rh-ease-menu" hidden>
                  <button class="rh-ease-choice active" data-ease="in">ease in</button>
                  <button class="rh-ease-choice"        data-ease="out">ease out</button>
                  <button class="rh-ease-choice"        data-ease="double">↔ double</button>
                </div>
              </div>
              <input type="range" id="rh-force" class="rh-force-slider"
                     min="0" max="100" value="0">
              <span class="mono rh-force-val" id="rh-force-val">0%</span>
            </div>
          </div>

        </section>

        <!-- ─── Resize handle ─── -->
        <div class="panel-resize-handle" id="panel-resize" style="width: 3px"></div>

        <!-- ─── RIGHT: Module parameters ─── -->
        <section class="params-section">
          <!-- Algorithm selector tabs (moved here from header) -->
          <nav class="tab-bar params-tab-bar" id="module-tabs" role="tablist">
            <button class="tab active" data-module="perimetro" role="tab" title="Perimetro">
              <svg class="tab-ico" viewBox="0 0 18 18" aria-hidden="true">
                <rect x="3" y="3" width="12" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <path d="M7.4 1.6 L10 3 L7.4 4.4" fill="none" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </button>
            <button class="tab" data-module="segmento" role="tab" title="Segmento">
              <svg class="tab-ico" viewBox="0 0 18 18" aria-hidden="true">
                <line x1="3.5" y1="14.5" x2="13" y2="5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M9.2 10.4 L9.7 8.3 L7.7 8.8" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="14.1" cy="3.9" r="1.8" fill="none" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </button>
            <button class="tab" data-module="traversa" role="tab" title="Traversa">
              <svg class="tab-ico" viewBox="0 0 18 18" aria-hidden="true">
                <line x1="9" y1="9" x2="3.6" y2="14.4" stroke="currentColor" stroke-width="1.2" stroke-dasharray="1.6 1.6" opacity="0.6"/>
                <line x1="9" y1="9" x2="13.4" y2="4.6" stroke="currentColor" stroke-width="1.4"/>
                <path d="M12.6 6.8 L13 5 L11.2 5.4" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="9" cy="9" r="1.7" fill="currentColor"/>
              </svg>
            </button>
            <button class="tab" data-module="aleatorio" role="tab" title="Aleatorio">
              <svg class="tab-ico" viewBox="0 0 18 18" aria-hidden="true">
                <rect x="2.5" y="2.5" width="13" height="13" rx="3" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="5.7" cy="5.7" r="1.15" fill="currentColor"/>
                <circle cx="12.3" cy="5.7" r="1.15" fill="currentColor"/>
                <circle cx="9" cy="9" r="1.15" fill="currentColor"/>
                <circle cx="5.7" cy="12.3" r="1.15" fill="currentColor"/>
                <circle cx="12.3" cy="12.3" r="1.15" fill="currentColor"/>
              </svg>
            </button>
            <button class="tab future" disabled title="Pioggia">
              <svg class="tab-ico" viewBox="0 0 18 18" aria-hidden="true">
                <circle cx="5.5" cy="3.2" r="1.1" fill="currentColor"/>
                <circle cx="5.5" cy="8" r="1.1" fill="currentColor"/>
                <circle cx="5.5" cy="12.8" r="1.1" fill="currentColor"/>
                <circle cx="12.5" cy="5.6" r="1.1" fill="currentColor"/>
                <circle cx="12.5" cy="10.4" r="1.1" fill="currentColor"/>
                <circle cx="12.5" cy="15.2" r="1.1" fill="currentColor"/>
              </svg>
            </button>
            <button class="tab" data-module="diretto" role="tab" title="Diretto">
              <svg class="tab-ico" viewBox="0 0 18 18" aria-hidden="true">
                <line x1="4.6" y1="15.6" x2="2.4" y2="13.4" stroke="currentColor" stroke-width="1.4"/>
                <line x1="3.5" y1="14.5" x2="13" y2="5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M9.2 10.4 L9.7 8.3 L7.7 8.8" fill="none" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </button>
          </nav>
          <div class="module-params" id="module-params" role="tabpanel">
            <!-- populated by modules.js -->
          </div>

          <footer class="params-footer">
            <!-- Unified speed range: min/max shared by every movement paradigm.
                 Perimetro has only one speed, so the min handle auto-locks to 0. -->
            <div class="speed-range" id="speed-range">
              <span class="speed-val mono" id="speed-min-val">40</span>
              <div class="speed-track" id="speed-track">
                <div class="speed-fill" id="speed-fill"></div>
                <div class="speed-thumb" id="speed-thumb-min" title="Velocità minima"></div>
                <div class="speed-thumb" id="speed-thumb-max" title="Velocità massima"></div>
              </div>
              <span class="speed-val mono" id="speed-max-val">120</span>
            </div>

            <div class="transport-group">
              <!-- Loop + direction: mockup, not wired to any logic yet -->
              <button class="transport-btn" id="loop-toggle" title="Loop">
                <svg class="ico" viewBox="0 0 18 18" aria-hidden="true">
                  <path d="M4.2 7.2 A5.2 5.2 0 0 1 13.6 5.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M12 3.8 L13.9 5.5 L11.9 7.1" fill="none" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M13.8 10.8 A5.2 5.2 0 0 1 4.4 12.4" fill="none" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M6 14.2 L4.1 12.5 L6.1 10.9" fill="none" stroke="currentColor" stroke-width="1.4"/>
                </svg>
              </button>
              <button class="transport-btn" id="direction-toggle" title="Direzione">
                <svg class="ico" viewBox="0 0 18 18" aria-hidden="true">
                  <line x1="3" y1="9" x2="15" y2="9" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M5.6 6.4 L3 9 L5.6 11.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M12.4 6.4 L15 9 L12.4 11.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
                </svg>
              </button>
              <!-- Transport toggle: mockup play/pause for the readhead -->
              <button class="transport-toggle" id="transport-toggle" data-state="paused" title="Play">
                <svg class="ico ico-play" viewBox="0 0 18 18" aria-hidden="true">
                  <path d="M5 3.5 L14 9 L5 14.5 Z" fill="currentColor"/>
                </svg>
                <svg class="ico ico-pause" viewBox="0 0 18 18" aria-hidden="true">
                  <rect x="4.5" y="3.5" width="3" height="11" fill="currentColor"/>
                  <rect x="10.5" y="3.5" width="3" height="11" fill="currentColor"/>
                </svg>
              </button>
            </div>
          </footer>

          <!-- Slave indicator: diagonal lines in bottom-right corner -->
          <canvas class="slave-canvas" id="slave-canvas" aria-hidden="true"></canvas>
        </section>

      </div><!-- /panel-body -->
    </div><!-- /main-panel -->


    <!-- ═══════════════════════════════════════════════════════════
         SECONDARY PANEL  (overlay, activated by logo click / ESC)
    ════════════════════════════════════════════════════════════════ -->
    <div class="panel overlay" id="secondary-panel" hidden>

      <header class="panel-header">
        <!-- Brand logo: click to show credits (same trigger as main panel) -->
        <div class="brand-select" id="brand-select-2">
          <button class="brand-btn" id="brand-btn-2" title="Crediti">
            <img class="brand-logo" src="media/Logo_TempoReale_white.webp" alt="Tempo Reale">
          </button>
        </div>
        <!-- Settings tabs — same style as algorithm tabs in main panel -->
        <nav class="tab-bar settings-tabs-bar" id="settings-tabs" role="tablist">
          <button class="tab active" data-settings="rig"      role="tab">Rig</button>
          <button class="tab"        data-settings="audio"    role="tab">Audio</button>
          <button class="tab"        data-settings="generali" role="tab">Generali</button>
        </nav>
        <!-- Right side: spat selector (mirrors main panel) + ψ close button + instance badge -->
        <div class="header-right">
          <div class="spat-select" id="spat-select-2">
            <button class="spat-btn mono" id="spat-btn-2">VBAP</button>
            <div class="spat-menu" id="spat-menu-2" hidden>
              <button class="spat-choice active" data-spat="vbap">VBAP</button>
              <button class="spat-choice" data-spat="dbap">DBAP</button>
              <button class="spat-choice" data-spat="ambisonics">Ambi3rd</button>
              <button class="spat-choice" data-spat="ambisonics">Ambi7th</button>
              <button class="spat-choice" data-spat="soundscape">Direct</button>
            </div>
          </div>
          <button class="logo-btn active-logo" id="logo-btn-2" title="Chiudi (ESC)"><svg class="logo-ico" viewBox="0 0 18 18" aria-hidden="true"><line x1="2.5" y1="5" x2="15.5" y2="5" stroke="currentColor" stroke-width="1.4"/><line x1="2.5" y1="9" x2="15.5" y2="9" stroke="currentColor" stroke-width="1.4"/><line x1="2.5" y1="13" x2="15.5" y2="13" stroke="currentColor" stroke-width="1.4"/><circle cx="11" cy="5" r="2" fill="var(--surface)" stroke="currentColor" stroke-width="1.4"/><circle cx="6" cy="9" r="2" fill="var(--surface)" stroke="currentColor" stroke-width="1.4"/><circle cx="12" cy="13" r="2" fill="var(--surface)" stroke="currentColor" stroke-width="1.4"/></svg></button>
          <span class="instance-badge mono">#1</span>
        </div>
      </header>

      <div class="panel-body">
        <div class="settings-body" id="settings-body">
          <!-- populated by app.js -->
        </div>
      </div>

      <!-- Global / stray toggle: scoped to the active settings tab, bottom-right -->
      <footer class="settings-footer">
        <div class="gs-toggle" id="gs-toggle">
          <button class="gs-btn active" data-gs="global">global</button>
          <button class="gs-btn"        data-gs="stray">stray</button>
        </div>
      </footer>

    </div><!-- /secondary-panel -->

    <!-- Credits modal (click the Tempo Reale logo) -->
    <div class="brand-backdrop" id="brand-backdrop"></div>
    <div class="brand-menu" id="brand-menu">
      <div class="brand-menu-title">GLOBO</div>
      <div class="brand-menu-row">
        <span class="brand-menu-lbl">Sviluppo</span>
        <span class="brand-menu-val">Cane, gatto, sacco</span>
      </div>
      <div class="brand-menu-row">
        <span class="brand-menu-lbl">Build</span>
        <span class="brand-menu-val mono">Mockup</span>
      </div>
    </div>

  </div><!-- /plugin-window -->

  <script src="js/circle.js"></script>
  <script src="js/modules.js"></script>
  <script src="js/rig.js"></script>
  <script src="js/arcs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
